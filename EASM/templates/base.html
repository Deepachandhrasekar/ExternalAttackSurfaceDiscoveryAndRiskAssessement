<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}EASM{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid" style="padding:0 1.5rem; height:58px; display:flex; align-items:center; justify-content:space-between;">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <div class="brand-hex">⬡</div>
      <div>
        <span style="display:block; font-size:1rem; color:var(--text-0); font-family:var(--font-mono); font-weight:700; letter-spacing:0.08em;">EASM</span>
        <span class="brand-sub">Attack Surface Monitor</span>
      </div>
    </a>
    <div style="display:flex; align-items:center; gap:0.5rem;">
      <a href="{{ url_for('index') }}" class="nav-link">New Scan</a>
      <a href="{{ url_for('rules') }}" class="nav-link">Rules</a>
      <span class="nav-badge">v2.0</span>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}



</body>
</html>
